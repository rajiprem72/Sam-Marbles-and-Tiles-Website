<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>For Victor...</title>
<style>
html,body{
margin:0;height:100%;overflow:hidden;
font-family:Georgia,serif;
background:radial-gradient(circle at top,#2f4f8f,#102040,#050b16);
display:flex;justify-content:center;align-items:center;color:#fff;
}
body:before{
content:"";position:fixed;inset:0;
background:
radial-gradient(circle,#fff8 1px,transparent 1px),
radial-gradient(circle,#ffd16666 1px,transparent 1px);
background-size:160px 160px,240px 240px;
animation:drift 70s linear infinite;
opacity:.35;
}
@keyframes drift{from{transform:translateY(0)}to{transform:translateY(-220px)}}
.container{position:relative;z-index:2;width:min(900px,90%);text-align:center}
#intro{font-size:48px;color:#ffd166;opacity:0;transition:1.5s;margin-bottom:60px}
#message{font-size:38px;line-height:1.8;min-height:330px}
.word{opacity:0;transition:.5s}
.word.show{opacity:1}
#signature{opacity:0;transition:2s;margin-top:50px;font-size:28px;color:#ffd166}
#hint{opacity:0;transition:2s;margin-top:25px;font-size:18px;color:#ddd}
.music{position:fixed;top:20px;right:20px;border:none;border-radius:50%;
width:56px;height:56px;font-size:22px;background:#ffd166;cursor:pointer}
@media(max-width:768px){
#intro{font-size:34px}
#message{font-size:24px}
#signature{font-size:22px}
}
</style>
</head>
<body>
<div class="container">
<div id="intro">Dear Victor...</div>
<div id="message"></div>
<div id="signature">
With Love and Gratitude,<br><br>
Premanandhan Narayanan
</div>
<div id="hint">Click anywhere to experience it again.</div>
</div>

<button class="music" id="music">🔊</button>
<audio id="bgm" loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<script>
const text=`Some people save lives through their profession.<br><br>

Some save lives through their compassion.<br><br>

Victor, you did both.<br><br>

This website is my humble expression of gratitude to a friend whose kindness I will cherish for the rest of my life.`;

const msg=document.getElementById("message");
const intro=document.getElementById("intro");
const sign=document.getElementById("signature");
const hint=document.getElementById("hint");
const music=document.getElementById("music");
const bgm=document.getElementById("bgm");

music.onclick=()=>{
 if(bgm.paused){bgm.play();music.textContent="🔇";}
 else{bgm.pause();music.textContent="🔊";}
};

function delayFor(word){
 if(word.endsWith(".")) return 1800;
 if(word.endsWith(",")) return 900;
 return 330;
}

async function play(){
 msg.innerHTML="";
 sign.style.opacity=0;
 hint.style.opacity=0;
 intro.style.opacity=1;
 await new Promise(r=>setTimeout(r,2500));
 const words=text.replace(/\n/g," \n ").split(/\s+/);
 let first=true;
 for(const w of words){
   if(w==="") continue;
   if(w=="\n"){
      msg.appendChild(document.createElement("br"));
      continue;
   }
   if(!first) msg.append(" ");
   first=false;
   const s=document.createElement("span");
   s.className="word";
   s.textContent=w;
   msg.appendChild(s);
   requestAnimationFrame(()=>s.classList.add("show"));
   await new Promise(r=>setTimeout(r,delayFor(w)));
 }
 await new Promise(r=>setTimeout(r,1800));
 sign.style.opacity=1;
 await new Promise(r=>setTimeout(r,2000));
 hint.style.opacity=1;
}

document.body.addEventListener("click",(e)=>{
 if(e.target.id==="music") return;
 play();
});

play();
</script>
</body>
</html>
